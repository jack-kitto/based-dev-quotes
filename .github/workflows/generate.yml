name: Update Quotes API

on:
  schedule:
    # Regenerate daily at midnight UTC (rotates today.json + random.json)
    - cron: '0 0 * * *'
  push:
    paths:
      - 'quotes/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate quotes
        run: python3 scripts/validate.py

      - name: Generate static API
        run: python3 scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "based-bot"
          git config user.email "bot@based-dev-quotes.dev"
          git add api/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            git commit -m "🧠 $(date -u +%Y-%m-%d) — regenerate API"
            git push
            echo "CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Purge jsDelivr CDN cache
        if: env.CHANGED == 'true'
        run: |
          FILES=(
            "api/v1/all.json"
            "api/v1/today.json"
            "api/v1/random.json"
            "api/v1/stats.json"
            "api/v1/version.json"
            "api/v1/categories/index.json"
            "api/v1/authors/index.json"
            "api/v1/tags/index.json"
          )
          echo "Purging ${#FILES[@]} files from jsDelivr CDN..."
          for f in "${FILES[@]}"; do
            STATUS=$(curl -s "https://purge.jsdelivr.net/gh/jack-kitto/based-dev-quotes@main/$f" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','error'))" 2>/dev/null || echo "error")
            echo "  $f → $STATUS"
          done
          echo "CDN purge complete"
